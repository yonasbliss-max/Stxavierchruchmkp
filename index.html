<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Church</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  overflow:hidden;
  background:black;
  color:white;
}

/* VIDEO INTRO */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  z-index:9999;
}

#intro video{
  width:100%;
  height:100%;
  object-fit:cover;
}

/* MAIN */
.main{
  position:fixed;
  width:100%;
  height:100vh;
  background:url('menu3.png') center/cover no-repeat;
  display:none;
}

.overlay{
  position:absolute;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
}

/* NAVBAR */
.navbar{
  position:absolute;
  top:10px;
  right:10px;
}

.navbar img{
  width:30px;
  margin-left:10px;
}

/* MENU */
.menu{
  position:absolute;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  text-align:center;
}

.btn{
  display:block;
  margin:12px;
  padding:15px 30px;
  border-radius:30px;
  border:none;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:16px;
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px cyan;
}

/* SCREENS */
.screen{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  top:0;
  left:100%;
  transition:0.5s;
  overflow:auto;
  padding:20px;
}

.screen.active{
  left:0;
}

.back{
  font-size:20px;
  cursor:pointer;
  margin-bottom:15px;
}

/* GALLERY */
.gallery{
  display:flex;
  flex-wrap:wrap;
  justify-content:center;
}

.gallery img{
  width:150px;
  margin:10px;
  border-radius:10px;
}

/* TOUCH */
.btn:active{
  transform:scale(0.9);
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
  <video id="introVideo" autoplay muted>
    <source src="loho.mp4">
  </video>
</div>

<!-- MAIN -->
<div class="main" id="main">
  <div class="overlay"></div>

  <div class="navbar">
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/2111/2111463.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/1384/1384060.png"></a>
    <a href="#"><img src="https://cdn-icons-png.flaticon.com/512/684/684908.png"></a>
  </div>

  <div class="menu">
    <button class="btn" onclick="openScreen('history')">ஆலய வரலாறு</button>
    <button class="btn" onclick="openScreen('mass')">திருப்பலி</button>
    <button class="btn" onclick="openScreen('gallery')">புகைப்படங்கள்</button>
    <button class="btn" onclick="openScreen('festival')">திருவிழா</button>
    <button class="btn" onclick="openScreen('groups')">ஆலய குழுக்கள்</button>
    <button class="btn" onclick="openScreen('contact')">தொடர்பு</button>
  </div>
</div>

<!-- SCREENS -->

<div id="history" class="screen">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <h2>History</h2>
  <p>உன் history இங்க paste பண்ணு</p>
</div>

<div id="mass" class="screen">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <h2>Mass</h2>
</div>

<div id="gallery" class="screen">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="mkp1.webp">
    <img src="mkp2.webp">
    <img src="mkp3.webp">
  </div>
</div>

<div id="festival" class="screen">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <h2>Festival</h2>
</div>

<div id="groups" class="screen">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <h2>Groups</h2>
</div>

<div id="contact" class="screen">
  <div class="back" onclick="goBack()">⬅ Back</div>
  <h2>Contact</h2>
</div>

<audio id="clickSound" src="click.mp3"></audio>

<script>
let currentScreen=null;

document.getElementById("introVideo").onended=()=>{
  document.getElementById("intro").style.display="none";
  document.getElementById("main").style.display="block";
};

function openScreen(id){
  playSound();
  vibrate();
  document.getElementById(id).classList.add("active");
  currentScreen=id;
}

function goBack(){
  playSound();
  vibrate();
  document.getElementById(currentScreen).classList.remove("active");
}

function playSound(){
  document.getElementById("clickSound").play();
}

function vibrate(){
  if(navigator.vibrate){
    navigator.vibrate(50);
  }
}
</script>

</body>
</html>
