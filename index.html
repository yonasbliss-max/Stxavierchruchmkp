<!DOCTYPE html>
<html lang="ta">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>St Xavier Church</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:sans-serif;
  background:black;
  color:white;
  overflow:hidden;
}

/* 🔥 LOGO ENTRY */
#intro{
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  display:flex;
  justify-content:center;
  align-items:center;
  z-index:9999;
  animation:fadeOut 1s ease 2.5s forwards;
}

#intro img{
  width:120px;
  animation:zoom 1.5s ease;
}

@keyframes zoom{
  from{transform:scale(0);}
  to{transform:scale(1);}
}

@keyframes fadeOut{
  to{opacity:0;visibility:hidden;}
}

/* SCREENS */
.screen{
  position:absolute;
  width:100%;
  height:100vh;
  top:0;
  left:100%;
  display:flex;
  flex-direction:column;
  justify-content:center;
  align-items:center;
  transition:0.6s;
}

.screen.active{
  left:0;
}

.screen.exit{
  left:-100%;
}

/* HOME */
#home{
  left:0;
  background:linear-gradient(135deg,#0f0c29,#302b63,#24243e);
}

/* BUTTONS */
.btn{
  margin:10px;
  padding:15px 30px;
  border:none;
  border-radius:30px;
  background:rgba(255,255,255,0.1);
  color:white;
  font-size:16px;
  backdrop-filter:blur(10px);
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  transform:scale(1.1);
  box-shadow:0 0 20px cyan;
}

/* BACK BUTTON */
.back{
  position:absolute;
  top:20px;
  left:20px;
  font-size:20px;
  cursor:pointer;
}

/* CONTENT */
.content{
  max-width:800px;
  text-align:center;
  padding:20px;
}

/* GALLERY */
.gallery{
  display:flex;
  overflow-x:auto;
  gap:10px;
}

.gallery img{
  width:200px;
  border-radius:15px;
}

</style>
</head>

<body>

<!-- 🔥 LOGO -->
<div id="intro">
  <img src="loho.mp4">
</div>

<!-- 🏠 HOME -->
<div id="home" class="screen active">
  <h1>புனித சவேரியார் ஆலயம்</h1>

  <button class="btn" onclick="openScreen('history')">ஆலய வரலாறு</button>
  <button class="btn" onclick="openScreen('gallery')">புகைப்படங்கள்</button>
  <button class="btn" onclick="openScreen('mass')">திருப்பலி</button>
</div>

<!-- 📖 HISTORY -->
<div id="history" class="screen">
  <div class="back" onclick="goBack()">⬅</div>
  <div class="content">
    <h2>History</h2>
    <p>உன் full history text இங்க paste பண்ணு</p>
  </div>
</div>

<!-- 🖼️ GALLERY -->
<div id="gallery" class="screen">
  <div class="back" onclick="goBack()">⬅</div>
  <h2>Gallery</h2>

  <div class="gallery">
    <img src="mkp1.webp">
    <img src="mkp2.webp">
    <img src="mkp3.webp">
  </div>
</div>

<!-- ⛪ MASS -->
<div id="mass" class="screen">
  <div class="back" onclick="goBack()">⬅</div>
  <h2>Holy Mass</h2>
  <p>திருப்பலி நேரங்கள் இங்க</p>
</div>

<script>
let current="home";

function openScreen(id){
  document.getElementById(current).classList.add("exit");
  document.getElementById(id).classList.add("active");
  current=id;
}

function goBack(){
  document.querySelector(".screen.active").classList.remove("active");
  document.getElementById(current).classList.remove("exit");
  current="home";
}
</script>

</body>
</html>
